<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>演示页面</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 48px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 520px;
      width: 100%;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h2 {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
      color: #64748b;
      line-height: 1.8;
      margin-bottom: 8px;
    }
    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 6px 16px;
      background: #eff6ff;
      color: #2563eb;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid #bfdbfe;
    }
    .features {
      margin-top: 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      text-align: left;
    }
    .feature-item {
      background: #f8fafc;
      border-radius: 8px;
      padding: 12px 14px;
      border: 1px solid #e2e8f0;
    }
    .feature-item .label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 4px;
    }
    .feature-item .value {
      font-size: 13px;
      font-weight: 600;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📊</div>
    <h2>演示内容页面</h2>
    <p>这是一个本地 Mock 演示页面，用于展示 Kivii Dashboard 的 <strong>iframe 嵌入</strong>能力。</p>
    <p>在实际项目中，此处将加载来自后端的业务页面。</p>
    <div class="badge">🚀 Kivii Dashboard — 开箱即用演示模式</div>
    <div class="features">
      <div class="feature-item">
        <div class="label">技术栈</div>
        <div class="value">Vue 3 + Vite + TS</div>
      </div>
      <div class="feature-item">
        <div class="label">样式框架</div>
        <div class="value">Tailwind CSS</div>
      </div>
      <div class="feature-item">
        <div class="label">状态管理</div>
        <div class="value">Pinia</div>
      </div>
      <div class="feature-item">
        <div class="label">路由模式</div>
        <div class="value">动态路由</div>
      </div>
    </div>
  </div>
</body>
</html>
