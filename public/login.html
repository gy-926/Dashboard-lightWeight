<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录</title>
  <style>
    /* ══════════════════════════════════════
         CSS 变量
      ══════════════════════════════════════ */
    :root {
      --page-bg: #0a0f1e;
      --orb-opacity: 0.45;
      --orb3-opacity: 0.2;
      --grid-color: rgba(59, 130, 246, 0.06);
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.12);
      --card-shadow:
        0 0 0 1px rgba(59, 130, 246, 0.25),
        0 0 28px 6px rgba(59, 130, 246, 0.18),
        0 0 64px 16px rgba(99, 102, 241, 0.12),
        0 16px 40px rgba(0, 0, 0, 0.45),
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 1px 0 rgba(255, 255, 255, 0.1) inset;
      --brand-name: #ffffff;
      --tagline: rgba(148, 163, 184, 0.9);
      --divider-line: rgba(255, 255, 255, 0.1);
      --divider-text: rgba(148, 163, 184, 0.7);
      --label: rgba(203, 213, 225, 0.9);
      --input-bg: rgba(255, 255, 255, 0.07);
      --input-border: rgba(255, 255, 255, 0.1);
      --input-focus-border: rgba(59, 130, 246, 0.7);
      --input-focus-bg: rgba(59, 130, 246, 0.06);
      --input-focus-shadow: rgba(59, 130, 246, 0.15);
      --input-text: #f1f5f9;
      --input-placeholder: rgba(148, 163, 184, 0.4);
      --icon-color: rgba(148, 163, 184, 0.7);
      --footer-border: rgba(255, 255, 255, 0.08);
      --page-footer: rgba(100, 116, 139, 0.7);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family:
        -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--page-bg);
    }

    /* ── 页面容器 ── */
    .login-page {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── 动态背景光晕 ── */
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }

    .bg-orb-1 {
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, #1d4ed8, #3b82f6);
      opacity: var(--orb-opacity);
      top: -140px;
      left: -140px;
      animation: drift1 12s ease-in-out infinite alternate;
    }

    .bg-orb-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #1e40af, #6366f1);
      opacity: var(--orb-opacity);
      bottom: -100px;
      right: -80px;
      animation: drift2 15s ease-in-out infinite alternate;
    }

    .bg-orb-3 {
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, #0ea5e9, #38bdf8);
      opacity: var(--orb3-opacity);
      top: 50%;
      left: 55%;
      transform: translate(-50%, -50%);
      animation: drift3 18s ease-in-out infinite alternate;
    }

    @keyframes drift1 {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(40px, 60px) scale(1.1);
      }
    }

    @keyframes drift2 {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(-50px, -40px) scale(1.08);
      }
    }

    @keyframes drift3 {
      from {
        transform: translate(-50%, -50%) scale(1);
      }

      to {
        transform: translate(-46%, -54%) scale(1.15);
      }
    }

    /* ── 网格纹理 ── */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ── 玻璃卡片 ── */
    .glass-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 40px 40px 32px;
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      box-shadow: var(--card-shadow);
    }

    /* ── 品牌区域 ── */
    .brand-area {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .brand-logo svg {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      filter: drop-shadow(0 4px 12px rgba(59, 130, 246, 0.5));
    }

    .brand-name {
      margin: 0 0 2px;
      font-size: 22px;
      font-weight: 700;
      color: var(--brand-name);
      letter-spacing: -0.3px;
    }

    .brand-tagline {
      margin: 0;
      font-size: 12px;
      color: var(--tagline);
      letter-spacing: 0.3px;
    }

    /* ── 分割线 ── */
    .divider {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
      gap: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--divider-line);
    }

    .divider span {
      font-size: 12px;
      color: var(--divider-text);
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    /* ── 表单 ── */
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--label);
      letter-spacing: 0.2px;
    }

    .field-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      transition:
        border-color 0.25s ease,
        background 0.25s ease,
        box-shadow 0.25s ease;
    }

    .field-input-wrap:focus-within {
      border-color: var(--input-focus-border);
      background: var(--input-focus-bg);
      box-shadow: 0 0 0 3px var(--input-focus-shadow);
    }

    .field-icon {
      display: flex;
      align-items: center;
      padding: 0 12px 0 14px;
      color: var(--icon-color);
      flex-shrink: 0;
    }

    .field-input-wrap input {
      flex: 1;
      padding: 13px 14px 13px 0;
      font-size: 14px;
      color: var(--input-text);
      background: transparent;
      border: none;
      outline: none;
      min-width: 0;
    }

    .field-input-wrap input::placeholder {
      color: var(--input-placeholder);
    }

    /* ── 错误提示 ── */
    .error-alert {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 8px;
      font-size: 13px;
      color: #f87171;
    }

    .error-alert.visible {
      display: flex;
      animation: shake 0.4s ease;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-6px);
      }

      40% {
        transform: translateX(6px);
      }

      60% {
        transform: translateX(-4px);
      }

      80% {
        transform: translateX(4px);
      }
    }

    /* ── 登录按钮 ── */
    .login-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      margin-top: 4px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.5px;
      overflow: hidden;
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        opacity 0.2s ease;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .login-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.5);
    }

    .login-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .btn-content {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-spinner {
      display: none;
      align-items: center;
      gap: 10px;
    }

    .spinner-ring {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── 卡片底部 ── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid var(--footer-border);
    }

    .security-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: rgba(52, 211, 153, 0.8);
      letter-spacing: 0.2px;
    }

    /* ── 页脚 ── */
    .page-footer {
      position: relative;
      z-index: 10;
      margin-top: 28px;
      font-size: 12px;
      color: var(--page-footer);
      letter-spacing: 0.3px;
    }

    /* ── 响应式 ── */
    @media (max-width: 480px) {
      .glass-card {
        margin: 0 16px;
        padding: 32px 28px 28px;
      }
    }
  </style>
</head>

<body>
  <div class="login-page">
    <!-- 动态背景光晕 -->
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="bg-grid"></div>

    <!-- 主体卡片 -->
    <div class="glass-card">
      <!-- 品牌区域 -->
      <div class="brand-area">
        <div class="brand-logo">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="40" height="40" rx="10" fill="url(#logoGrad)" />
            <path d="M12 20L18 26L28 14" stroke="white" stroke-width="3" stroke-linecap="round"
              stroke-linejoin="round" />
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                <stop stop-color="#3B82F6" />
                <stop offset="1" stop-color="#1D4ED8" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="brand-text">
          <h1 class="brand-name" id="login-title">登录</h1>
          <p class="brand-tagline" id="login-subtitle"></p>
        </div>
      </div>

      <!-- 分割线 -->
      <div class="divider"><span>安全登录</span></div>

      <!-- 登录表单 -->
      <form class="login-form" id="login-form" autocomplete="off">
        <!-- 用户名 -->
        <div class="field-group">
          <div class="field-label">用户名</div>
          <div class="field-input-wrap">
            <span class="field-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" />
                <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2" />
              </svg>
            </span>
            <input id="username" type="text" placeholder="请输入用户名" autocomplete="username" />
          </div>
        </div>

        <!-- 密码 -->
        <div class="field-group">
          <div class="field-label">密码</div>
          <div class="field-input-wrap">
            <span class="field-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </span>
            <input id="password" type="password" placeholder="请输入密码" autocomplete="current-password" />
          </div>
        </div>

        <!-- 错误提示 -->
        <div class="error-alert" id="error-alert">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
            <line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <line x1="12" y1="16" x2="12.01" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
          <span id="error-text"></span>
        </div>

        <!-- 登录按钮 -->
        <button type="submit" class="login-btn" id="login-btn">
          <span class="btn-content" id="btn-normal">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" />
              <polyline points="10 17 15 12 10 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" />
              <line x1="15" y1="12" x2="3" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
            登 录
          </span>
          <span class="btn-spinner" id="btn-loading">
            <span class="spinner-ring"></span>
            验证中...
          </span>
        </button>
      </form>

      <!-- 底部信息 -->
      <div class="card-footer">
        <div class="security-badge">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2"
              stroke-linejoin="round" />
          </svg>
          SSL 加密传输
        </div>
      </div>
    </div>

    <!-- 页脚版权 -->
    <div class="page-footer" id="page-footer">© 2026 GavinYin Hub · 保留所有权利</div>
  </div>

  <script>
    var cfg = {
      loginApiUrl: '/auth/kivii.json',
      redirectUrl: '/',
      title: '登录',
      subtitle: ''
    };

    // 读取登录配置
    fetch('./login-config.json?_=' + Date.now())
      .then(function (r) { return r.json(); })
      .then(function (data) {
        cfg = Object.assign(cfg, data);
        document.getElementById('login-title').textContent = cfg.title || '登录';
        document.getElementById('login-subtitle').textContent = cfg.subtitle || '';
        document.title = cfg.title || '登录';
      })
      .catch(function () {
        // 配置文件读取失败时使用默认值，不阻断流程
      });

    // 表单提交
    document.getElementById('login-form').addEventListener('submit', function (e) {
      e.preventDefault();
      handleLogin();
    });

    function handleLogin () {
      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value;

      if (!username || !password) {
        showError('请输入用户名和密码');
        return;
      }

      setLoading(true);
      clearError();

      fetch(cfg.loginApiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, password: password }),
        credentials: 'include'   // 携带并接收 Cookie（服务器 session 模式必须）
      })
        .then(function (res) {
          if (!res.ok) {
            return res.json().catch(function () { return {}; }).then(function (body) {
              throw new Error(body.message || body.Message || '登录失败，请检查用户名或密码');
            });
          }
          return res.json();
        })
        .then(function () {
          // 登录成功：Cookie 已由服务器写入
          // 优先使用 URL 中的 ?redirect= 参数，否则使用配置中的 redirectUrl
          var params = new URLSearchParams(window.location.search);
          var target = params.get('redirect') || cfg.redirectUrl || '/';
          window.location.href = target;
        })
        .catch(function (err) {
          showError(err.message || '登录失败，请稍后重试');
          setLoading(false);
        });
    }

    function showError (msg) {
      var el = document.getElementById('error-alert');
      document.getElementById('error-text').textContent = msg;
      el.classList.remove('visible');
      // 触发重新动画
      void el.offsetWidth;
      el.classList.add('visible');
    }

    function clearError () {
      document.getElementById('error-alert').classList.remove('visible');
    }

    function setLoading (loading) {
      document.getElementById('login-btn').disabled = loading;
      document.getElementById('btn-normal').style.display = loading ? 'none' : 'flex';
      document.getElementById('btn-loading').style.display = loading ? 'flex' : 'none';
    }
  </script>
</body>

</html>
